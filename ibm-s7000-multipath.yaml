apiVersion: node.harvesterhci.io/v1beta1
kind: CloudInit
metadata:
  name: ibm-v7000-multipath
  namespace: harvester-system
spec:
  matchSelector: {}
  filename: 99-ibm-v7000-multipath.yaml
  contents: |
    stages:
      network:
        - name: "Configure multipath.conf for IBM V7000"
          files:
            - path: /etc/multipath.conf
              permissions: 0644
              owner: 0
              group: 0
              content: |
                defaults {
                    user_friendly_names no
                    find_multipaths yes
                }
                blacklist {
                   devnode "^sd[a-z0-9]+"
                }
                devices {
                    device {
                        vendor "IBM"
                        product "2145"
                        path_grouping_policy "group_by_prio"
                        path_selector "service-time 0"
                        prio "alua"
                        failback "immediate"
                        rr_weight "uniform"
                        no_path_retry "queue"
                        features "1 queue_if_no_path"
                        hardware_handler "1 alua"
                        detect_prio "yes"
                        dev_loss_tmo "infinity"
                        fast_io_fail_tmo 5
                    }
                }
        - name: "Enable and start multipathd"
          systemctl:
            enable:
              - multipathd
            start:
              - multipathd
